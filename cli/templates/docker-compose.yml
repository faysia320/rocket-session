services:
  postgres:
    image: postgres:16-alpine
    container_name: rocket-session-postgres
    environment:
      POSTGRES_DB: rocket_session
      POSTGRES_USER: rocket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rocket_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rocket -d rocket_session"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: __PACKAGE_ROOT__/backend
    container_name: rocket-session-backend
    expose:
      - "8101"
    volumes:
      - rocket-uploads:/app/uploads
      - ${CLAUDE_AUTH_DIR}:/root/.claude
      - ${CLAUDE_AUTH_FILE}:/root/.claude.json
      - rocket-workspaces:/workspaces
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8101
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=postgresql+asyncpg://rocket:${POSTGRES_PASSWORD:-rocket_secret}@postgres:5432/rocket_session
      - CLAUDE_ALLOWED_TOOLS=${CLAUDE_ALLOWED_TOOLS:-Read,Write,Edit,Bash}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CORS_EXTRA_ORIGINS=${CORS_EXTRA_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: __PACKAGE_ROOT__/frontend
    container_name: rocket-session-frontend
    ports:
      - "${ROCKET_PORT:-8100}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  rocket-uploads:
  rocket-workspaces:
