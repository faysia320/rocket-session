services:
  postgres:
    image: postgres:16-alpine
    container_name: rocket-session-postgres
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c work_mem=4MB
    environment:
      POSTGRES_DB: rocket_session
      POSTGRES_USER: rocket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rocket_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./observability/postgres/init-glitchtip.sql:/docker-entrypoint-initdb.d/02-init-glitchtip.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rocket -d rocket_session"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: rocket-session-backend
    expose:
      - "8101"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - rocket-uploads:/app/uploads
      - rocket-workspaces:/workspaces
      - ${CLAUDE_AUTH_DIR}:/root/.claude
      - ${CLAUDE_AUTH_FILE}:/root/.claude.json
    environment:
      - DATABASE_URL=postgresql+asyncpg://rocket:${POSTGRES_PASSWORD:-rocket_secret}@postgres:5432/rocket_session
      - POSTGRES_HOST=postgres
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8101
      - UPLOAD_DIR=/app/uploads
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CORS_EXTRA_ORIGINS=${CORS_EXTRA_ORIGINS:-}
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: rocket-session-frontend
    ports:
      - "8100:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rocket-session-redis
    restart: unless-stopped

  glitchtip-web:
    image: glitchtip/glitchtip:v4.1
    container_name: rocket-session-glitchtip
    ports:
      - "8200:8080"
    environment:
      DATABASE_URL: postgres://rocket:${POSTGRES_PASSWORD:-rocket_secret}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      PORT: "8080"
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8200}
      DEFAULT_FROM_EMAIL: noreply@localhost
      CELERY_WORKER_AUTOSCALE: "1,3"
      ENABLE_OPEN_USER_REGISTRATION: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1
    container_name: rocket-session-glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://rocket:${POSTGRES_PASSWORD:-rocket_secret}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8200}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: rocket-session-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: rocket-session-promtail
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: rocket-session-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  rocket-uploads:
  rocket-workspaces:
  loki_data:
  grafana_data:
